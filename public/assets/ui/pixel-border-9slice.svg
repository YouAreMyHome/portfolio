<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Simple 9-slice pixel border: 4px solid outer, 2px inner groove -->
  <rect x="0" y="0" width="64" height="64" fill="none" stroke="#000" stroke-width="4" shape-rendering="crispEdges" />
  <rect x="6" y="6" width="52" height="52" fill="none" stroke="#444" stroke-width="2" shape-rendering="crispEdges" />
</svg>
